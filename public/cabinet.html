<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет — AI-секретарь</title>
<style>
  :root { --bg:#0f1216; --card:#1a1f26; --fg:#e7ecf2; --muted:#8b97a7; --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:18px 20px; border-bottom:1px solid #2a313b; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  h1 { font-size:18px; margin:0; }
  main { max-width:860px; margin:0 auto; padding:20px; }
  .card { background:var(--card); border:1px solid #2a313b; border-radius:12px; padding:18px; margin-bottom:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  input, textarea, select { width:100%; padding:9px 11px; background:#0e1217; border:1px solid #2a313b; border-radius:8px; color:var(--fg); font:inherit; }
  textarea { min-height:88px; resize:vertical; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:9px 16px; font:inherit; cursor:pointer; }
  button.secondary { background:#2a313b; }
  button:disabled { opacity:.5; cursor:default; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
  .row > * { flex:1; min-width:160px; }
  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; }
  .pill.ok { background:rgba(34,197,94,.15); color:var(--ok); }
  .pill.warn { background:rgba(245,158,11,.15); color:var(--warn); }
  .pill.bad { background:rgba(239,68,68,.15); color:var(--bad); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .muted { color:var(--muted); }
  .check { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #232a33; }
  .bar { height:8px; background:#0e1217; border-radius:6px; overflow:hidden; }
  .bar > span { display:block; height:100%; background:var(--accent); }
  #msg { position:fixed; right:16px; bottom:16px; background:#232a33; border:1px solid #2a313b; padding:10px 14px; border-radius:8px; display:none; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🤖 Личный кабинет</h1>
  <span id="who" class="muted"></span>
  <span style="flex:1"></span>
  <button class="secondary" id="logout" hidden>Выйти</button>
</header>
<main>
  <div class="card" id="login">
    <h2>Вход</h2>
    <p class="muted">Введите токен кабинета (его выдаёт администратор сервиса).</p>
    <label>Токен кабинета</label>
    <input id="token" placeholder="cabinet token" autocomplete="off">
    <p style="margin-top:12px"><button id="enter">Войти</button></p>
  </div>

  <div id="app" hidden>
    <div class="card">
      <h2>Обзор</h2>
      <div class="grid">
        <div><span class="muted">Арендатор</span><br><b id="tname"></b></div>
        <div><span class="muted">Статус</span><br><span id="tstatus"></span></div>
        <div><span class="muted">Тариф</span><br><b id="tplan"></b></div>
        <div><span class="muted">Период</span><br><span id="tperiod" class="muted"></span></div>
      </div>
      <label style="margin-top:14px">Ответов за месяц</label>
      <div class="bar"><span id="usebar"></span></div>
      <div class="muted" id="usetext" style="font-size:13px; margin-top:4px"></div>
    </div>

    <div class="card">
      <h2>Готовность к работе</h2>
      <div id="checks"></div>
    </div>

    <div class="card">
      <h2>Тариф и оплата</h2>
      <div class="row">
        <div><label>Тариф</label><select id="plan"></select></div>
        <div style="flex:0"><label>&nbsp;</label><button id="pay">Оплатить</button></div>
      </div>
      <p class="muted" id="invoices" style="font-size:13px; margin-top:10px"></p>
    </div>

    <div class="card">
      <h2>Персона секретаря</h2>
      <label>Имя секретаря и тон (JSON persona или текст base)</label>
      <textarea id="persona_base" placeholder="Базовые инструкции персоны…"></textarea>
      <label>Факты (knowledge base)</label>
      <textarea id="persona_facts" placeholder="Факты, на которые опирается секретарь…"></textarea>
      <p style="margin-top:12px"><button id="savePersona">Сохранить персону</button></p>
    </div>

    <div class="card">
      <h2>Подключение Telegram-бота</h2>
      <label>Токен бота (BotFather)</label>
      <input id="bot_token" placeholder="123456:ABC…" autocomplete="off">
      <p style="margin-top:12px"><button id="connect">Подключить и настроить webhook</button></p>
      <p class="muted" id="channels" style="font-size:13px"></p>
    </div>
  </div>
</main>
<div id="msg"></div>

<script>
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem('cabinet_token') || '';

function toast(t, bad) {
  const m = $('#msg'); m.textContent = t; m.style.borderColor = bad ? '#ef4444' : '#2a313b';
  m.style.display = 'block'; clearTimeout(m._t); m._t = setTimeout(() => m.style.display = 'none', 3500);
}
async function api(path, opts = {}) {
  const r = await fetch('/api/cabinet' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, ...(opts.headers || {}) }
  });
  if (r.status === 401) { logout(); throw new Error('Неверный токен'); }
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.error || ('HTTP ' + r.status));
  return body;
}
function pill(status) {
  const cls = status === 'ok' ? 'ok' : status === 'fail' ? 'bad' : 'warn';
  const txt = status === 'ok' ? 'готово' : status === 'fail' ? 'нужно' : 'внимание';
  return '<span class="pill ' + cls + '">' + txt + '</span>';
}
function logout() {
  TOKEN = ''; localStorage.removeItem('cabinet_token');
  $('#app').hidden = true; $('#login').hidden = false; $('#logout').hidden = true; $('#who').textContent = '';
}

async function load() {
  const d = await api('');
  $('#login').hidden = true; $('#app').hidden = false; $('#logout').hidden = false;
  $('#who').textContent = d.tenant.id;
  $('#tname').textContent = d.tenant.name || d.tenant.id;
  $('#tstatus').innerHTML = pill(d.tenant.status === 'active' ? 'ok' : 'fail') + ' ' + d.tenant.status;
  $('#tplan').textContent = d.tenant.plan;
  $('#tperiod').textContent = d.usage.period;
  const lim = d.usage.replies_limit;
  $('#usebar').style.width = lim ? Math.min(100, 100 * d.usage.replies / lim) + '%' : '8%';
  $('#usetext').textContent = 'Ответов: ' + d.usage.replies + (lim ? ' из ' + lim : ' (безлимит)') + ' · токенов: ' + d.usage.tokens;

  $('#checks').innerHTML = d.readiness.checks.map(c =>
    '<div class="check"><span>' + c.label + (c.detail ? ' <span class="muted">— ' + c.detail + '</span>' : '') + '</span>' + pill(c.status) + '</div>'
  ).join('');

  $('#plan').innerHTML = d.purchasable.map(p =>
    '<option value="' + p + '">' + p + ' — ' + d.prices[p] + ' ₽/мес</option>').join('');
  $('#invoices').textContent = d.invoices.length
    ? 'Последние счета: ' + d.invoices.slice(0, 3).map(i => '#' + i.inv_id + ' ' + i.plan + ' (' + i.status + ')').join(', ')
    : 'Счетов пока нет.';

  $('#persona_base').value = (d.persona && d.persona.base_md) || '';
  $('#persona_facts').value = (d.persona && d.persona.facts_md) || '';
  $('#channels').textContent = d.channels.length ? 'Каналы: ' + d.channels.join(', ') : 'Бот ещё не подключён.';
}

$('#enter').onclick = () => {
  TOKEN = $('#token').value.trim(); if (!TOKEN) return;
  localStorage.setItem('cabinet_token', TOKEN);
  load().catch(e => toast(e.message, true));
};
$('#logout').onclick = logout;
$('#pay').onclick = async () => {
  try {
    const r = await api('/billing/checkout', { method: 'POST', body: JSON.stringify({ plan: $('#plan').value }) });
    location.href = r.payment_url;
  } catch (e) { toast(e.message, true); }
};
$('#savePersona').onclick = async () => {
  try {
    await api('/persona', { method: 'POST', body: JSON.stringify({ base_md: $('#persona_base').value, facts_md: $('#persona_facts').value }) });
    toast('Персона сохранена'); load();
  } catch (e) { toast(e.message, true); }
};
$('#connect').onclick = async () => {
  try {
    const r = await api('/connect/telegram', { method: 'POST', body: JSON.stringify({ bot_token: $('#bot_token').value.trim() }) });
    toast('Подключён @' + r.bot.username + (r.webhook_set ? ', webhook настроен' : '')); load();
  } catch (e) { toast(e.message, true); }
};

if (TOKEN) load().catch(() => logout());
</script>
</body>
</html>
