# docker-compose — telegram-secretary
#
# Только прокси (LLM указан в .env через LITELLM_*/GW_*):
#   docker compose up -d
#
# Прокси + локальный OpenClaw Gateway (единая память):
#   docker compose --profile gateway up -d
#   В .env при этом: GW_BASE_URL=http://openclaw-gateway:18789

services:
  secretary:
    build: .
    container_name: telegram-secretary
    env_file:
      - path: .env
        required: false   # без .env сервер упадёт с понятным списком незаполненных переменных
    environment:
      - STATE_DIR=/data
    ports:
      - "${PORT:-18792}:18792"
    volumes:
      - secretary-state:/data
    restart: unless-stopped
    networks:
      - secretary-net

  # Опционально: OpenClaw-инстанс рядом (профиль gateway).
  # Workspace гейтвея — это и есть единая память секретаря.
  openclaw-gateway:
    image: node:22-slim
    container_name: openclaw-gateway
    profiles: ["gateway"]
    volumes:
      - ./workspace:/workspace
      - openclaw-data:/root/.openclaw
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    command: >
      sh -c "npm install -g openclaw@latest &&
             OPENCLAW_HOME=/workspace openclaw gateway run --port 18789"
    restart: unless-stopped
    networks:
      - secretary-net

volumes:
  secretary-state:
  openclaw-data:

networks:
  secretary-net:
    driver: bridge
