# Nginx config example for gh-secretary
# Place at /etc/nginx/sites-available/, symlink to sites-enabled/

server {
    listen 80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/secretary-access.log;
    error_log  /var/log/nginx/secretary-error.log;

    # Telegram Business webhook
    location /secretary/tg/business-webhook {
        proxy_pass http://127.0.0.1:18792/secretary/tg/business-webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;

        # Telegram sends small JSON payloads
        client_max_body_size 1m;
        proxy_read_timeout 30s;
    }

    # Health and admin API (restrict by IP if exposed publicly)
    location /api/ {
        # allow 127.0.0.1;
        # allow your.office.ip;
        # deny all;
        proxy_pass http://127.0.0.1:18792/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:18792/health;
        access_log off;
    }
}
